# CI: quality gates for the JME Parts Store
# Runs on every push and pull request so problems surface before merge.

name: CI
on:
  push:
    branches: ["**"]
  pull_request:

defaults:
  run:
    working-directory: parts-store

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: parts-store/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Maintenance agent (catalog integrity)
        run: npm run agent:maintenance

      - name: Production build
        run: npm run build
